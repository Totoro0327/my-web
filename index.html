<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ColorWalk Pro - Gradient Halftone Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#8b5cf6;--glass-panel:rgba(255,255,255,.08);--glass-card:rgba(255,255,255,.05);--glass-input:rgba(0,0,0,.15);--glass-border:rgba(255,255,255,.15);--glass-border-light:rgba(255,255,255,.3);--text-main:#fff;--text-muted:rgba(255,255,255,.66);--trans:all .35s cubic-bezier(.2,.8,.2,1)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#0b1020;color:var(--text-main);min-height:100vh;overflow-x:hidden;padding:80px 0 46px}
.aurora{position:fixed;inset:0;z-index:-2;overflow:hidden;background:#050510}
.blob{position:absolute;border-radius:50%;filter:blur(110px);opacity:.72;animation:float 18s infinite alternate ease-in-out}
.b1{width:56vw;height:56vw;background:#4f46e5;top:-12%;left:-10%}
.b2{width:52vw;height:52vw;background:#db2777;right:-10%;bottom:-16%;animation-delay:-6s}
.b3{width:42vw;height:42vw;background:#06b6d4;left:28%;top:38%;animation-delay:-11s}
@keyframes float{0%{transform:translate(0,0) scale(1)}100%{transform:translate(14%,10%) scale(1.16)}}
.glass-header,.glass-footer{position:fixed;left:0;right:0;z-index:100;display:flex;justify-content:center;align-items:center;background:rgba(255,255,255,.03);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.glass-header{top:0;height:60px;border-bottom:1px solid var(--glass-border);box-shadow:0 4px 30px rgba(0,0,0,.12)}
.glass-header h1{font-size:20px;font-weight:800;letter-spacing:1.8px;background:linear-gradient(135deg,#fff 0%,#a5b4fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.glass-footer{bottom:0;height:40px;border-top:1px solid var(--glass-border);background:linear-gradient(90deg,rgba(255,255,255,.02) 0%,rgba(139,92,246,.12) 50%,rgba(255,255,255,.02) 100%);font-size:12px}
.glass-footer p{background:linear-gradient(135deg,#fff 0%,#a5b4fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:600;letter-spacing:1px}
.wrap{max-width:1720px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.grid{display:grid;grid-template-columns:400px minmax(0,1fr);gap:28px;align-items:start}
.panel{background:var(--glass-panel);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid var(--glass-border-light);border-radius:24px;padding:24px;box-shadow:0 18px 40px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.04);max-height:calc(100vh - 140px);overflow-y:auto}
.panel::-webkit-scrollbar{width:6px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.22);border-radius:6px}
.prev{position:sticky;top:90px;height:calc(100vh - 140px);display:flex}
.cvs-w{width:100%;height:100%;background:var(--glass-panel);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid var(--glass-border-light);border-radius:24px;padding:14px;box-shadow:0 20px 50px rgba(0,0,0,.3),inset 0 0 0 1px rgba(255,255,255,.04);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;border-radius:14px;opacity:0;transition:opacity .35s;box-shadow:0 10px 30px rgba(0,0,0,.2);background:transparent}
.emp{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;color:var(--text-muted);z-index:10;text-align:center}
.step{position:relative;padding-left:24px;margin-bottom:24px}
.step::before{content:"";position:absolute;left:3px;top:10px;bottom:-28px;width:1px;background:var(--glass-border)}
.step:last-child::before{display:none}
.dot{position:absolute;left:-1px;top:9px;width:9px;height:9px;border-radius:50%;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.9),0 0 0 4px rgba(255,255,255,.08)}
.st-tit{font-size:16px;font-weight:700;margin-bottom:14px}
.lock{opacity:.35;pointer-events:none;filter:grayscale(1)}
.cg{background:var(--glass-card);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--glass-border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 4px 15px rgba(0,0,0,.06)}
label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px}
.up-box{border:1px dashed var(--glass-border-light);border-radius:16px;padding:26px;text-align:center;cursor:pointer;background:var(--glass-card);transition:var(--trans)}
.up-box:hover{transform:translateY(-1px);border-color:#fff;background:rgba(255,255,255,.08)}
#fIn{display:none}
input[type="text"].rt,select,textarea{width:100%;padding:10px 12px;background:var(--glass-input);border:1px solid var(--glass-border);border-radius:10px;font-size:13px;color:#fff;outline:none;transition:var(--trans)}
select option{background:#1e293b;color:#fff}
textarea{resize:vertical;min-height:60px}
.sg{margin-bottom:14px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:10px}
.sy-in{background:transparent;border:none;color:#fff;font-size:14px;font-weight:700;text-align:right;min-width:58px;outline:none}
input[type="range"]{width:100%;height:5px;background:rgba(255,255,255,.12);border-radius:999px;outline:none;-webkit-appearance:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--primary);cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.switch{position:relative;display:inline-block;width:46px;height:24px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;border-radius:24px;background:var(--glass-input);border:1px solid var(--glass-border);transition:.3s;cursor:pointer}
.slider:before{content:"";position:absolute;left:3px;bottom:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.3s}
.switch input:checked+.slider{background:var(--primary);border-color:var(--primary)}
.switch input:checked+.slider:before{transform:translateX(22px)}
.pal{display:flex;gap:10px;flex-wrap:wrap}
.sw{width:30px;height:30px;border-radius:10px;cursor:pointer;border:2px solid rgba(255,255,255,.12);box-shadow:0 6px 14px rgba(0,0,0,.12);transition:var(--trans)}
.sw:hover{transform:translateY(-1px)}
.sw.act{transform:scale(1.12);border-color:#0f172a;box-shadow:0 0 0 2px rgba(255,255,255,.75),0 10px 16px rgba(0,0,0,.18)}
.seg{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px}
.radio{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#fff;cursor:pointer}
.radio input{accent-color:#3b82f6}
.btn{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--glass-border-light);background:rgba(255,255,255,.1);color:#fff;font-weight:700;font-size:14px;cursor:pointer;backdrop-filter:blur(10px);transition:var(--trans);margin-top:14px}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.14)}
.btn.sm{margin-top:0;padding:10px 12px;width:auto;flex:1}
.line2{display:flex;gap:10px;flex-wrap:wrap}
.muted{font-size:12px;color:var(--text-muted)}
@media (max-width:1024px){body{padding:70px 0 44px}.grid{display:flex;flex-direction:column;gap:18px}.prev{order:-1;position:sticky;top:70px;z-index:20;height:54vh}.panel{order:1;max-height:none;overflow:visible;padding:18px;border-radius:20px}.cvs-w{padding:8px;border-radius:18px}}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<header class="glass-header"><h1>ColorWalk Pro</h1></header>
<div class="wrap">
  <div class="grid">
    <div class="panel">
      <div class="step">
        <div class="dot"></div><div class="st-tit">1. 唤醒照片</div>
        <div class="up-box" id="upA"><div style="font-size:32px;margin-bottom:8px;">📸</div><p style="font-weight:600;font-size:14px;color:var(--text-muted);">点击上传照片 / 拖拽图片到这里</p></div>
        <input type="file" id="fIn" accept="image/*" />
      </div>
      <div class="step lock st-n">
        <div class="dot"></div><div class="st-tit">2. 构图与波点拼贴</div>
        <div class="cg">
          <label>排版模式</label>
          <select id="lMod" class="rt" style="margin-bottom:14px;"><option value="3:4">竖屏 3:4（上色下图）</option><option value="4:3">横屏 4:3（左色右图）</option></select>
          <div class="sg"><div class="sh"><label>版面分割比例</label><input type="text" id="vSpI" class="sy-in"></div><input type="range" id="vSp" min="10" max="90" value="50"></div>
          <div class="sg"><div class="sh"><label>图片缩放（Zoom）</label><input type="text" id="vZmI" class="sy-in"></div><input type="range" id="vZm" min="0.6" max="3" step="0.01" value="1"></div>
          <div class="sg"><div class="sh"><label>平移 X</label><input type="text" id="vPxI" class="sy-in"></div><input type="range" id="vPx" min="-100" max="100" step="1" value="0"></div>
          <div class="sg"><div class="sh"><label>平移 Y</label><input type="text" id="vPyI" class="sy-in"></div><input type="range" id="vPy" min="-100" max="100" step="1" value="0"></div>
        </div>
        <div class="cg">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <label style="margin:0;color:#fff;font-weight:700;">开启艺术波点（Halftone）</label>
            <label class="switch"><input type="checkbox" id="htOn" class="rt"><span class="slider"></span></label>
          </div>
          <div id="htPanel" style="display:none;border-top:1px dashed var(--glass-border);padding-top:14px;">
            <div class="line2" style="margin-bottom:14px;">
              <div style="flex:1;min-width:140px;"><label>显示区域</label><select id="htArea" class="rt"><option value="all">全图显示</option><option value="colorOnly">仅在色块区</option><option value="imgOnly">仅在图片区</option><option value="dual" selected>双区智能分离</option></select></div>
              <div style="flex:1;min-width:140px;"><label>波点颜色</label><select id="htColor" class="rt"><option value="main" selected>主色</option><option value="white">纯白</option><option value="black">纯黑</option><option value="sample">采样原图</option></select></div>
            </div>
            <div class="line2" style="margin-bottom:14px;">
              <div style="flex:1;min-width:140px;"><label>波点形状</label><select id="htShape" class="rt"><option value="circle" selected>● 波点</option><option value="heart">♥ 爱心</option><option value="star">★ 五角星</option><option value="butterfly">🦋 蝴蝶</option><option value="drop">💧 雨滴</option></select></div>
              <div style="flex:1;min-width:140px;"><label>排布方式</label><select id="htLayout" class="rt"><option value="random" selected>随机散布</option><option value="hex">蜂窝交错</option><option value="grid">规则网格</option></select></div>
            </div>
            <div class="sg"><div class="sh"><label>基础大小</label><input type="text" id="htSzI" class="sy-in"></div><input type="range" id="htSz" min="4" max="100" value="14"></div>
            <div class="sg"><div class="sh"><label>波点间距</label><input type="text" id="htGapI" class="sy-in"></div><input type="range" id="htGap" min="16" max="120" value="46"></div>
            <div class="sg"><div class="sh"><label>数量 / 密度</label><input type="text" id="htDenI" class="sy-in"></div><input type="range" id="htDen" min="10" max="100" value="38"></div>
            <div class="sg"><div class="sh"><label>大小差异（基于亮度）</label><input type="text" id="htVarI" class="sy-in"></div><input type="range" id="htVar" min="0" max="100" value="68"></div>
            <div class="sg"><div class="sh"><label>随机偏移</label><input type="text" id="htJitI" class="sy-in"></div><input type="range" id="htJit" min="0" max="80" value="28"></div>
            <div class="sg"><div class="sh"><label>波点透明度</label><input type="text" id="htAlpI" class="sy-in"></div><input type="range" id="htAlp" min="10" max="100" value="72"></div>
          </div>
        </div>
      </div>
      <div class="step lock st-n">
        <div class="dot"></div><div class="st-tit">3. 灵魂色彩与渐变</div>
        <div class="cg"><label>智能提取 5 大主色</label><div class="pal" id="mPal"><span class="muted">等待分析...</span></div></div>
        <div class="cg">
          <label>色彩渲染模式</label>
          <div class="seg">
            <label class="radio"><input type="radio" name="gradMode" value="solid" checked> 纯色</label>
            <label class="radio"><input type="radio" name="gradMode" value="coolwarm"> 冷暖</label>
            <label class="radio"><input type="radio" name="gradMode" value="depth"> 深浅</label>
            <label class="radio"><input type="radio" name="gradMode" value="custom"> 自定义双拼</label>
          </div>
          <div id="gradPanel" style="margin-top:10px;">
            <label>自选拼色 1</label><div class="pal" id="gPal1" style="margin-bottom:14px;"><span class="muted">等待分析...</span></div>
            <label>自选拼色 2</label><div class="pal" id="gPal2" style="margin-bottom:14px;"><span class="muted">等待分析...</span></div>
            <div class="sg"><div class="sh"><label>渐变角度</label><input type="text" id="gAngI" class="sy-in"></div><input type="range" id="gAng" min="0" max="360" value="90"></div>
            <div class="sg"><div class="sh"><label>融合比例</label><input type="text" id="gMixI" class="sy-in"></div><input type="range" id="gMix" min="0" max="100" value="67"></div>
          </div>
        </div>
      </div>
      <div class="step lock st-n">
        <div class="dot"></div><div class="st-tit">4. 赋予文字</div>
        <div class="cg">
          <label>一键文案模板</label>
          <div class="line2" style="margin-bottom:12px;">
            <button class="btn sm" type="button" id="tp1">📍 时间地点</button>
            <button class="btn sm" type="button" id="tp2">🎨 主色色号</button>
            <button class="btn sm" type="button" id="tp3">📜 文艺诗句</button>
          </div>
          <label>上行文字</label><input id="t1" class="rt" type="text" value="2026.05.11" style="margin-bottom:12px;">
          <label>下行文字</label><textarea id="t2" class="rt" rows="2">Halftone Art</textarea>
        </div>
        <div class="cg">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
            <div id="aiTip" style="font-size:12px;color:#34d399;font-weight:700;">✨ AI 智能文字色：等待分析</div>
            <div style="display:flex;align-items:center;gap:8px;"><label style="margin:0;">自定义颜色</label><input type="color" id="tColInp" value="#ffffff" style="width:34px;height:34px;border:none;background:none;"></div>
          </div>
          <div class="line2" style="margin-bottom:14px;">
            <div style="flex:1;min-width:140px;"><label>字体风格</label><select id="fF" class="rt"><option value="'Inter', sans-serif" selected>Inter（现代）</option><option value="'Arial', sans-serif">Arial</option><option value="'Helvetica', sans-serif">Helvetica</option><option value="'宋体', serif">宋体</option><option value="'黑体', sans-serif">黑体</option></select></div>
            <div style="flex:1;min-width:140px;"><label>字体粗细</label><select id="fW" class="rt"><option value="300">Light</option><option value="400">Regular</option><option value="600" selected>SemiBold</option><option value="700">Bold</option><option value="800">ExtraBold</option></select></div>
          </div>
          <div class="sg"><div class="sh"><label>上行字体大小</label><input type="text" id="vSz1I" class="sy-in"></div><input type="range" id="vSz1" min="16" max="100" value="34"></div>
          <div class="sg"><div class="sh"><label>下行字体大小</label><input type="text" id="vSz2I" class="sy-in"></div><input type="range" id="vSz2" min="16" max="120" value="46"></div>
          <div class="sg"><div class="sh"><label>上下行间距</label><input type="text" id="vGapI" class="sy-in"></div><input type="range" id="vGap" min="0" max="120" value="18"></div>
        </div>
        <button class="btn" id="dl">⬇️ 保存高清作品</button>
      </div>
    </div>
    <div class="prev">
      <div class="cvs-w">
        <div class="emp" id="emp"><div style="font-size:48px;opacity:.85;margin-bottom:14px;">🖼️</div><p style="font-weight:600;">等待上传照片</p></div>
        <canvas id="cvs" width="900" height="1200"></canvas>
      </div>
    </div>
  </div>
</div>
<footer class="glass-footer"><p>Designed by Totoro</p></footer>

<script>
class KMeans{
  constructor(k){this.k=k}
  fit(px){
    if(!px.length)return[];
    let c=Array.from({length:this.k},()=>px[Math.floor(Math.random()*px.length)]),cl=[];
    for(let it=0;it<8;it++){
      cl=Array.from({length:this.k},()=>[]);
      for(const p of px){
        let md=Infinity,id=0;
        for(let i=0;i<this.k;i++){
          const d=(p[0]-c[i][0])**2+(p[1]-c[i][1])**2+(p[2]-c[i][2])**2;
          if(d<md){md=d;id=i}
        }
        cl[id].push(p);
      }
      let chg=false;
      for(let i=0;i<this.k;i++){
        if(!cl[i].length)continue;
        let r=0,g=0,b=0,l=cl[i].length;
        for(const p of cl[i]){r+=p[0];g+=p[1];b+=p[2]}
        const nc=[Math.round(r/l),Math.round(g/l),Math.round(b/l)];
        if(nc[0]!==c[i][0]||nc[1]!==c[i][1]||nc[2]!==c[i][2])chg=true;
        c[i]=nc;
      }
      if(!chg)break;
    }
    return c.map((v,i)=>({r:v[0],g:v[1],b:v[2],cnt:cl[i]?.length||0,hex:'#'+((1<<24)+(v[0]<<16)+(v[1]<<8)+v[2]).toString(16).slice(1).toUpperCase()})).sort((a,b)=>b.cnt-a.cnt);
  }
}

const $=id=>document.getElementById(id);
const ui={
  up:$('upA'),fi:$('fIn'),lm:$('lMod'),cvs:$('cvs'),emp:$('emp'),dl:$('dl'),
  mp:$('mPal'),gPal1:$('gPal1'),gPal2:$('gPal2'),
  t1:$('t1'),t2:$('t2'),tp1:$('tp1'),tp2:$('tp2'),tp3:$('tp3'),
  tColInp:$('tColInp'),aiTip:$('aiTip'),fF:$('fF'),fW:$('fW'),
  htOn:$('htOn'),htPanel:$('htPanel'),htArea:$('htArea'),htColor:$('htColor'),htShape:$('htShape'),htLayout:$('htLayout')
};
const ctx=ui.cvs.getContext('2d');

let upImg=null,exC=[],mCol='#8B5CF6',tCol='#FFFFFF',gCol1='#8B5CF6',gCol2='#1E293B';
const binds=[];

function bS(sid,iid,fmt,prs){
  const s=$(sid),i=$(iid);if(!s||!i)return;
  const uI=()=>i.value=fmt(s.value);
  const uS=()=>{const v=prs(i.value);if(!isNaN(v)){s.value=v;uI();draw()}};
  s.oninput=()=>{uI();draw()};i.onchange=uS;i.onblur=uI;uI();
  binds.push({id:sid,g:()=>parseFloat(s.value)});
}
const gV=id=>binds.find(b=>b.id===id)?.g()||0;

bS('vSp','vSpI',v=>`${v} / ${100-v}`,v=>parseFloat(String(v).split('/')[0]));
bS('vZm','vZmI',v=>`${parseFloat(v).toFixed(2)}x`,v=>parseFloat(String(v).replace('x','')));
bS('vPx','vPxI',v=>`${v}%`,v=>parseFloat(String(v).replace('%','')));
bS('vPy','vPyI',v=>`${v}%`,v=>parseFloat(String(v).replace('%','')));
bS('htSz','htSzI',v=>`${v}px`,v=>parseFloat(String(v).replace('px','')));
bS('htGap','htGapI',v=>`${v}px`,v=>parseFloat(String(v).replace('px','')));
bS('htDen','htDenI',v=>`${v}%`,v=>parseFloat(String(v).replace('%','')));
bS('htVar','htVarI',v=>`${v}%`,v=>parseFloat(String(v).replace('%','')));
bS('htJit','htJitI',v=>`${v}px`,v=>parseFloat(String(v).replace('px','')));
bS('htAlp','htAlpI',v=>`${v}%`,v=>parseFloat(String(v).replace('%','')));
bS('gAng','gAngI',v=>`${v}°`,v=>parseFloat(String(v).replace('°','')));
bS('gMix','gMixI',v=>`${v}%`,v=>parseFloat(String(v).replace('%','')));
bS('vSz1','vSz1I',v=>`${v}px`,v=>parseFloat(String(v).replace('px','')));
bS('vSz2','vSz2I',v=>`${v}px`,v=>parseFloat(String(v).replace('px','')));
bS('vGap','vGapI',v=>`${v}px`,v=>parseFloat(String(v).replace('px','')));

const h2r=h=>{const x=h.replace('#','');return{r:parseInt(x.substring(0,2),16),g:parseInt(x.substring(2,4),16),b:parseInt(x.substring(4,6),16)}};
const r2h=(r,g,b)=>'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('').toUpperCase();
const mixH=(a,b,t)=>{const ca=h2r(a),cb=h2r(b);return r2h(ca.r+(cb.r-ca.r)*t,ca.g+(cb.g-ca.g)*t,ca.b+(cb.b-ca.b)*t)};
const ldP=h=>({light:mixH(h,'#FFFFFF',.42),dark:mixH(h,'#0F172A',.56)});
const cwP=h=>{const c=h2r(h);return{light:r2h(c.r*.75,c.g*.95,Math.min(255,c.b*1.2+18)),dark:r2h(Math.min(255,c.r*1.15+18),c.g*.92,c.b*.78)}};
const lum=h=>{const{r,g,b}=h2r(h);return(r*299+g*587+b*114)/1000};

function bGrad(x,y,w,h){
  const md=document.querySelector('input[name="gradMode"]:checked')?.value||'solid';
  const ang=gV('gAng')*Math.PI/180,mix=gV('gMix')/100;
  let c1=mCol,c2=mCol;
  if(md==='solid')return{t:'s',c:mCol};
  if(md==='coolwarm'){const p=cwP(mCol);c1=p.light;c2=p.dark}
  else if(md==='depth'){const p=ldP(mCol);c1=p.light;c2=p.dark}
  else if(md==='custom'){c1=gCol1||mCol;c2=gCol2||exC[1]?.hex||mixH(mCol,'#0F172A',.35)}
  const cx=x+w/2,cy=y+h/2,len=Math.max(w,h),dx=Math.cos(ang)*len,dy=Math.sin(ang)*len;
  const gr=ctx.createLinearGradient(cx-dx/2,cy-dy/2,cx+dx/2,cy+dy/2);
  gr.addColorStop(0,c1);gr.addColorStop(Math.max(.05,Math.min(.95,mix)),mixH(c1,c2,.35));gr.addColorStop(1,c2);
  return{t:'g',gr};
}

function bPal(tg,act,cb){
  tg.innerHTML='';if(!exC.length){tg.innerHTML='<span class="muted">等待分析...</span>';return}
  exC.forEach(c=>{
    const s=document.createElement('div');s.className='sw'+(c.hex===act?' act':'');s.style.background=c.hex;
    s.onclick=()=>{Array.from(tg.children).forEach(e=>e.classList.remove('act'));s.classList.add('act');cb(c.hex)};
    tg.appendChild(s);
  });
}

function bMPal(){
  ui.mp.innerHTML='';if(!exC.length)return;
  exC.forEach((c,i)=>{
    const s=document.createElement('div');s.className='sw'+(i===0?' act':'');s.style.background=c.hex;
    s.onclick=()=>{Array.from(ui.mp.children).forEach(e=>e.classList.remove('act'));s.classList.add('act');mCol=c.hex;if(!gCol1)gCol1=c.hex;sTxt();draw()};
    ui.mp.appendChild(s);
  });
}

function sTxt(){
  tCol=lum(mCol)>144?'#1E293B':'#FFFFFF';ui.tColInp.value=tCol;
  ui.aiTip.innerText=`✨ AI 智能推荐: ${tCol==='#FFFFFF'?'浅色':'深色'}文字`;ui.aiTip.style.color='#34d399';
}

function anCol(img){
  const tc=document.createElement('canvas'),tx=tc.getContext('2d');tc.width=72;tc.height=72;tx.drawImage(img,0,0,72,72);
  const d=tx.getImageData(0,0,72,72).data,px=[];
  for(let i=0;i<d.length;i+=4){if(d[i+3]<10)continue;const s=d[i]+d[i+1]+d[i+2];if(s>740||s<36)continue;px.push([d[i],d[i+1],d[i+2]])}
  exC=new KMeans(5).fit(px);
  if(!exC.length)exC=[{hex:'#8B5CF6'},{hex:'#4F46E5'},{hex:'#06B6D4'},{hex:'#F97316'},{hex:'#CBD5E1'}];
  mCol=exC[0].hex;gCol1=exC[1]?.hex||exC[0].hex;gCol2=exC[4]?.hex||exC[2]?.hex||mixH(exC[0].hex,'#0F172A',.35);
  bMPal();bPal(ui.gPal1,gCol1,h=>{gCol1=h;draw()});bPal(ui.gPal2,gCol2,h=>{gCol2=h;draw()});sTxt();draw();
}

ui.up.onclick=()=>ui.fi.click();
ui.up.ondragover=e=>{e.preventDefault();ui.up.style.borderColor='#fff';ui.up.style.background='rgba(255,255,255,.1)'};
ui.up.ondragleave=()=>{ui.up.style.borderColor='var(--glass-border-light)';ui.up.style.background='var(--glass-card)'};
ui.up.ondrop=e=>{e.preventDefault();ui.up.style.borderColor='var(--glass-border-light)';ui.up.style.background='var(--glass-card)';if(e.dataTransfer.files[0])hdF(e.dataTransfer.files[0])};
ui.fi.onchange=e=>{if(e.target.files[0])hdF(e.target.files[0])};

function hdF(f){
  if(!f.type.startsWith('image/'))return alert('请上传图片');
  ui.up.innerHTML='<div style="font-size:32px;margin-bottom:8px;">✨</div><p style="font-weight:700;font-size:14px;color:#fff;">解析成功，点击可重新上传</p>';
  const rd=new FileReader();
  rd.onload=ev=>{const img=new Image();img.onload=()=>{upImg=img;document.querySelectorAll('.st-n').forEach(e=>e.classList.remove('lock'));ui.emp.style.display='none';ui.cvs.style.opacity='1';anCol(img)};img.src=ev.target.result};
  rd.readAsDataURL(f);
}

ui.tp1.onclick=()=>{const d=new Date();ui.t1.value=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;ui.t2.value='Somewhere on Earth';draw()};
ui.tp2.onclick=()=>{ui.t1.value='COLOR';ui.t2.value=mCol.toUpperCase();draw()};
ui.tp3.onclick=()=>{ui.t1.value='浮生暂歇';ui.t2.value='偏爱这半抹春色。';draw()};
ui.tColInp.addEventListener('input',e=>{tCol=e.target.value;ui.aiTip.innerText='🎨 已切换为自定义颜色';ui.aiTip.style.color='#a5b4fc';draw()});
document.querySelectorAll('.rt').forEach(e=>e.addEventListener('input',draw));
document.querySelectorAll('input[name="gradMode"]').forEach(e=>e.addEventListener('change',draw));
ui.htOn.addEventListener('change',e=>{ui.htPanel.style.display=e.target.checked?'block':'none';draw()});

const dShp={
  circle:(c,x,y,r)=>{c.moveTo(x+r,y);c.arc(x,y,r,0,Math.PI*2)},
  heart:(c,x,y,r)=>{c.moveTo(x,y+r*.85);c.bezierCurveTo(x-r*1.45,y-r*.15,x-r*.9,y-r*1.22,x,y-r*.38);c.bezierCurveTo(x+r*.9,y-r*1.22,x+r*1.45,y-r*.15,x,y+r*.85)},
  star:(c,x,y,r)=>{c.moveTo(x,y-r);for(let i=1;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,rr=i%2===0?r:r*.42;c.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr)}c.closePath()},
  butterfly:(c,x,y,r)=>{c.moveTo(x,y);c.bezierCurveTo(x-r*1.6,y-r*1.35,x-r*1.55,y+r*.35,x-r*.2,y+r*.25);c.bezierCurveTo(x-r*1.2,y+r*.7,x-r*.7,y+r*1.3,x,y+r*.55);c.bezierCurveTo(x+r*.7,y+r*1.3,x+r*1.2,y+r*.7,x+r*.2,y+r*.25);c.bezierCurveTo(x+r*1.55,y+r*.35,x+r*1.6,y-r*1.35,x,y)},
  drop:(c,x,y,r)=>{c.moveTo(x,y-r*1.15);c.bezierCurveTo(x+r*.9,y-r*.55,x+r*.95,y+r*.65,x,y+r*.95);c.bezierCurveTo(x-r*.95,y+r*.65,x-r*.9,y-r*.55,x,y-r*1.15)}
};

// 固定的伪随机函数，确保波点位置在调节透明度时不会发生位移
const sr=(x,y)=>{let n=Math.sin(x*12.9898+y*78.233)*43758.5453;return n-Math.floor(n)};

function draw(){
  if(!upImg)return;
  const w=ui.lm.value==='3:4'?900:1200,h=ui.lm.value==='3:4'?1200:900;
  ui.cvs.width=w;ui.cvs.height=h;ctx.clearRect(0,0,w,h);
  const sp=gV('vSp')/100,cr={x:0,y:0,w,h},ir={x:0,y:0,w,h};
  if(ui.lm.value==='3:4'){cr.h=h*sp;ir.y=h*sp;ir.h=h*(1-sp)}else{cr.w=w*sp;ir.x=w*sp;ir.w=w*(1-sp)}
  
  const zm=gV('vZm'),px=gV('vPx')/100,py=gV('vPy')/100,iR=upImg.width/upImg.height,cR=w/h;
  let fw,fh;if(iR>cR){fh=h*zm;fw=upImg.width*(fh/upImg.height)}else{fw=w*zm;fh=upImg.height*(fw/upImg.width)}
  const fx=(w-fw)/2+px*(w*.5),fy=(h-fh)/2+py*(h*.5);

  const st=bGrad(cr.x,cr.y,cr.w,cr.h);ctx.fillStyle=st.t==='s'?st.c:st.gr;ctx.fillRect(cr.x,cr.y,cr.w,cr.h);
  ctx.save();ctx.beginPath();ctx.rect(ir.x,ir.y,ir.w,ir.h);ctx.clip();ctx.drawImage(upImg,fx,fy,fw,fh);ctx.restore();

  if(ui.htOn.checked){
    const oc=document.createElement('canvas');oc.width=w;oc.height=h;
    const ox=oc.getContext('2d',{willReadFrequently:true});ox.drawImage(upImg,fx,fy,fw,fh);
    const dt=ox.getImageData(0,0,w,h).data,bSz=gV('htSz'),gp=gV('htGap'),dn=gV('htDen'),vr=gV('htVar')/100,jt=gV('htJit'),al=gV('htAlp')/100;
    const ar=ui.htArea.value,cM=ui.htColor.value,ly=ui.htLayout.value,sFn=dShp[ui.htShape.value]||dShp.circle;
    ctx.save();ctx.globalAlpha=al;let rw=0;
    for(let y=gp/2;y<h;y+=gp){
      const xO=(ly==='hex'&&rw%2?gp/2:0);
      for(let x=gp/2+xO;x<w;x+=gp){
        if(sr(x,y)*100>dn)continue;
        const inC=ui.lm.value==='3:4'?y<cr.h:x<cr.w;
        if(ar==='imgOnly'&&inC)continue;if(ar==='colorOnly'&&!inC)continue;
        const ix=Math.max(0,Math.min(w-1,Math.floor(x))),iy=Math.max(0,Math.min(h-1,Math.floor(y))),id=(iy*w+ix)*4;
        const r=dt[id],g=dt[id+1],b=dt[id+2],a=dt[id+3];if(a<8)continue;
        const br=(r*.299+g*.587+b*.114)/255,sz=Math.max(.55,bSz*(1-br*vr));
        const aJ=ly==='random'?Math.max(jt,gp*.65):jt,jx=x+(sr(x,y+1)-.5)*aJ*2,jy=y+(sr(x+1,y)-.5)*aJ*2;
        if(ar==='dual')ctx.fillStyle=inC?`rgb(${r},${g},${b})`:mCol;
        else if(cM==='main')ctx.fillStyle=mCol;else if(cM==='white')ctx.fillStyle='#FFF';else if(cM==='black')ctx.fillStyle='#000';else ctx.fillStyle=`rgb(${r},${g},${b})`;
        ctx.beginPath();sFn(ctx,jx,jy,sz);ctx.fill();
      }
      rw++;
    }
    ctx.restore();
  }

  const tT=ui.t1.value.trim(),bT=ui.t2.value.trim();
  if(tT||bT){
    ctx.fillStyle=tCol;ctx.textAlign='center';ctx.textBaseline='middle';
    const tS=gV('vSz1'),bS=gV('vSz2'),gp=gV('vGap'),cX=cr.x+cr.w/2,cY=cr.y+cr.h/2,fF=ui.fF.value,fW=ui.fW.value;
    const bL=bT?bT.split('\n'):[],bLH=bS*1.34,bTH=bL.length?(bL.length-1)*bLH+bS:0,tH=(tT?tS:0)+(bT?bTH:0)+(tT&&bT?gp:0);
    let y=cY-tH/2;
    if(tT){ctx.font=`${fW} ${tS}px ${fF}`;ctx.fillText(tT,cX,y+tS/2);y+=tS+gp}
    if(bT){ctx.font=`${fW} ${bS}px ${fF}`;bL.forEach((l,i)=>ctx.fillText(l,cX,y+bS/2+i*bLH))}
  }
}

ui.dl.onclick=()=>{if(!upImg)return alert('请先上传照片');const l=document.createElement('a');l.download=`ColorWalk_${Date.now()}.png`;l.href=ui.cvs.toDataURL('image/png',1);l.click()};
</script>
